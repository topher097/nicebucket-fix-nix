repos:
  - repo: local
    hooks:
      - id: regenerate-bun-nix
        name: Regenerate .nix/bun.nix
        entry: bash -c 'mkdir -p .nix && bunx bun2nix -o .nix/bun.nix'
        language: system
        always_run: true
        files: ^bun\.lock$
        stages: [pre-commit]
        pass_filenames: false
